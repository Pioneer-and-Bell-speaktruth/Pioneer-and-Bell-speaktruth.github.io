<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Church Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('/static/images/login_bg.jpg') no-repeat center center/cover;
            font-family: "Georgia", serif;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        h1 {
            font-size: 42px;
            color: #ffd700;
            margin-bottom: 40px;
            text-shadow: 0 0 12px #b8860b;
        }

        .btn {
            display: inline-block;
            margin: 14px;
            padding: 16px 26px;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.35);
        }

        .btn:hover {
            background: linear-gradient(90deg, #d4a017, #ffdf00);
        }
    </style>
</head>
<body>

    <h1>Welcome to the Congregation Portal</h1>

    <!-- Member Login -->
    <a class="btn" href="/login/">Member Login</a>

    <!-- Admin Login -->
    <a class="btn" href="/admin/">Admin Login</a>

</body>
</html>
