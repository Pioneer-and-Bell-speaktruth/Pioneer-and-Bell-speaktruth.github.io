<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pioneer & Bell</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('/static/images/login_bg.jpg') no-repeat center center/cover;
            font-family: "Georgia", serif;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #b8860b;
        }

        nav a {
            margin: 0 15px;
            color: #ffd700;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-shadow: 0 0 10px #ffd700;
        }

        /* MAIN CONTENT */
        .content {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            color: #ffd700;
            text-shadow: 0 0 12px #b8860b;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
        }

        /* FOOTER BUTTONS */
        footer {
            text-align: center;
            padding: 30px;
            border-top: 2px solid #b8860b;
            background: rgba(0, 0, 0, 0.6);
        }

        .btn {
            display: inline-block;
            margin: 12px;
            padding: 14px 22px;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            background: linear-gradient(90deg, #d4a017, #ffdf00);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/about/">About Us</a>
            <a href="/contact/">Contact Us</a>
            <a href="/articles/">Articles</a>
            <a href="/sermons/">Sermon Outlines</a>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <div class="content">
        <h1>Welcome to the Pioneer & Bell church of Christ</h1>

        <p>
            This page is still currently under construction.  
            In the meantime, here is the link to our YouTube channel.
        </p>

        <a class="btn" href="https://www.youtube.com/@TheKing4Life" target="_blank">
            TheKing4Life
        </a>
    </div>


    <!-- FOOTER WITH LOGIN BUTTONS -->
    <footer>
        <a class="btn" href="https://speaktruth.onrender.com">Member Login</a>
        <a class="btn" href="https://speaktruth.onrender.com/admin/">Admin Login</a>
        <a class="btn" href="https://www.thelordsway.com/pioneer" target="_blank">
    Old Website (TheLordsWay)
</a>
    </footer>

</body>
</html>
