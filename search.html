<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <link rel="canonical" href="https://pioneer-and-bell-speaktruth.github.io/search.html">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/lumen/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Include your navbar here (same as other pages) -->
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">Pioneer & Bell church of Christ</a>

        <button class="navbar-toggler" type="button" aria-label="Toggle navigation" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" href="articles.html">Articles</a></li>
                <li class="nav-item"><a class="nav-link" href="sermons.html">Sermons</a></li>
                <li class="nav-item"><a class="nav-link" href="request.html">Request Books</a></li>
            </ul>

            <!-- Site-wide Search -->
            <form class="d-flex" onsubmit="return siteSearch(event)">
                <input 
                    id="navbarSearch"
                    class="form-control me-2"
                    type="search"
                    placeholder="Search site..."
                >
                <button class="btn btn-light" type="submit">Search</button>
            </form>

        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 id="searchTitle">Search Results</h2>
    <div id="results"></div>
</div>

<script>
// Navbar search redirect
function siteSearch(event) {
    event.preventDefault();
    let query = document.getElementById("navbarSearch").value.toLowerCase();
    window.location.href = "search.html?q=" + encodeURIComponent(query);
}

// Full text search
document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const query = params.get("q")?.toLowerCase() || "";
    document.getElementById("searchTitle").innerText = `Results for "${query}"`;

    const pages = [
        "index.html",
        "about.html",
        "contact.html",
        "articles.html",
        "sermons.html",
        "request.html"
    ];

    const resultsDiv = document.getElementById("results");

    if (!query) {
        resultsDiv.innerHTML = "<p>Please enter a search term.</p>";
        return;
    }

    pages.forEach(page => {
        fetch(page)
            .then(response => response.text())
            .then(text => {
                const cleanText = text.replace(/<[^>]*>/g, " ").toLowerCase();

                if (cleanText.includes(query)) {
                    let snippetIndex = cleanText.indexOf(query);
                    let snippet = cleanText.substring(snippetIndex - 60, snippetIndex + 60);

                    resultsDiv.innerHTML += `
                        <div class="card mb-3">
                            <div class="card-body">
                                <h5 class="card-title">${page}</h5>
                                <p class="card-text">...${snippet}...</p>
                                <a href="${page}" class="btn btn-primary">Open Page</a>
                            </div>
                        </div>
                    `;
                }
            });
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
