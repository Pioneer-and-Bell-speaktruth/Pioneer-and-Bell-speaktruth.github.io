<!-- MAIN CONTENT -->
<div class="container bg-light p-4 rounded shadow-sm">

    <h1 class="text-primary text-center mb-4">Request “Let the Bible Speak” Books</h1>

    <p class="lead text-center">
        All books are <strong>completely free</strong>, including shipping.  
        Please enter the quantities you would like to receive.
    </p>

    <form action="mailto:pbeccofc@gmail.com" method="post" enctype="text/plain" class="mt-4">

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label fw-bold">Your Name</label>
            <input type="text" name="Name" class="form-control" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label fw-bold">Your Email</label>
            <input type="email" name="Email" class="form-control" required>
        </div>

        <!-- Address -->
        <div class="mb-3">
            <label class="form-label fw-bold">Your Mailing Address</label>
            <textarea name="Address" rows="4" class="form-control" required></textarea>
        </div>

        <hr class="my-4">

        <h4 class="text-secondary mb-3">Book Quantities</h4>

        <!-- Full Set -->
        <div class="mb-3">
            <label class="form-label fw-bold">Full Set (Volumes 1–5)</label>
            <input type="number" name="Full Set Quantity" class="form-control" min="0" max="10" value="0">
        </div>

        <!-- Individual Volumes -->
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Volume 1</label>
                <input type="number" name="Volume 1 Quantity" class="form-control" min="0" max="10" value="0">
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Volume 2</label>
                <input type="number" name="Volume 2 Quantity" class="form-control" min="0" max="10" value="0">
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Volume 3</label>
                <input type="number" name="Volume 3 Quantity" class="form-control" min="0" max="10" value="0">
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Volume 4</label>
                <input type="number" name="Volume 4 Quantity" class="form-control" min="0" max="10" value="0">
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Volume 5</label>
                <input type="number" name="Volume 5 Quantity" class="form-control" min="0" max="10" value="0">
            </div>
        </div>

        <!-- Notes -->
        <div class="mb-4">
            <label class="form-label fw-bold">Additional Notes (Optional)</label>
            <textarea name="Notes" rows="3" class="form-control"></textarea>
        </div>

        <!-- Submit -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary btn-lg">Submit Request</button>
        </div>

    </form>
</div>
