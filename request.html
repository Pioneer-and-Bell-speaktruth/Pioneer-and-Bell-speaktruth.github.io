<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Books – Pioneer & Bell church of Christ</title>
    <link rel="stylesheet" href="/speaktruth-pioneer/static/css/bootstrap.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('/static/images/login_bg.jpg') no-repeat center center/cover;
            font-family: "Georgia", serif;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #b8860b;
        }

        nav a {
            margin: 0 15px;
            color: #ffd700;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-shadow: 0 0 10px #ffd700;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(0, 0, 0, 0.55);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #b8860b;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        h1, h2 {
            color: #ffd700;
            text-shadow: 0 0 10px #b8860b;
        }

        label {
            font-size: 20px;
            display: block;
            margin-top: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #b8860b;
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            padding: 14px 22px;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        button:hover {
            background: linear-gradient(90deg, #d4a017, #ffdf00);
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 2px solid #b8860b;
            background: rgba(0, 0, 0, 0.6);
            color: #ffd700;
            margin-top: auto;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
        <a href="articles.html">Articles</a>
        <a href="sermons.html">Sermons</a>
        <a href="request.html">Request Books</a>
    </nav>
</header>

<div class="container">
    <h1>Request “Let the Bible Speak” Books</h1>

<form action="mailto:patrick.e.king1958@gmail.com" method="post" enctype="text/plain">

    <p style="font-size:20px; margin-bottom:20px;">
        All books are <strong>completely free</strong>, including shipping.  
        Please enter the quantities you would like to receive.
    </p>

    <label>Your Name</label>
    <input type="text" name="Name" required>

    <label>Your Email</label>
    <input type="email" name="Email" required>

    <label>Your Mailing Address</label>
    <textarea name="Address" rows="4" required></textarea>

    <h2 style="color:#ffd700; margin-top:30px;">Book Quantities</h2>

    <label>Full Set (Volumes 1–5)</label>
    <input type="number" name="Full Set Quantity" min="0" max="10" value="0">

    <label>Volume 1</label>
    <input type="number" name="Volume 1 Quantity" min="0" max="10" value="0">

    <label>Volume 2</label>
    <input type="number" name="Volume 2 Quantity" min="0" max="10" value="0">

    <label>Volume 3</label>
    <input type="number" name="Volume 3 Quantity" min="0" max="10" value="0">

    <label>Volume 4</label>
    <input type="number" name="Volume 4 Quantity" min="0" max="10" value="0">

    <label>Volume 5</label>
    <input type="number" name="Volume 5 Quantity" min="0" max="10" value="0">

    <label>Additional Notes (Optional)</label>
    <textarea name="Notes" rows="3"></textarea>

    <button type="submit">Submit Request</button>
</form>
</div>

<footer>
    &copy; 2026 Pioneer & Bell church of Christ
</footer>

</body>
</html>
